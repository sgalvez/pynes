name: Continuous Build

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "issue/**"
  pull_request:

jobs:
  package:
    name: Package continuous build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run lint
        run: python -m ruff check .

      - name: Generate build metadata
        run: |
          python scripts/generate_build_metadata.py --write-package-info --update-project-version

      - name: Generate changelog
        run: python scripts/generate_changelog.py

      - name: Generate release notes
        run: python scripts/generate_release_notes.py

      - name: Verify stamped CLI help
        run: python -m nes_py --help

      - name: Verify stamped CLI version
        run: python -m nes_py --version

      - name: Build package artifacts
        run: python -m build

      - name: Upload Python package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error

      - name: Upload build changelog
        uses: actions/upload-artifact@v4
        with:
          name: build-changelog
          path: build/CHANGELOG.md
          if-no-files-found: error

      - name: Upload build release notes
        uses: actions/upload-artifact@v4
        with:
          name: build-release-notes
          path: build/RELEASE_NOTES.md
          if-no-files-found: error

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build/BUILD_INFO.json
          if-no-files-found: error
